services:
  backend:
    build: ./backend
    container_name: tool-repo-backend
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:///app/data/tool_repository.db
      - UPLOAD_DIR=/app/uploads
    volumes:
      - /Dokploy/data/tez-portal:/app/data
      - /Dokploy/data/tez-portal/uploads:/app/uploads
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: tool-repo-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  data:
  uploads:
