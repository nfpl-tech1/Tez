services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_URL=sqlite:////app/data/db/tool_repository.db
      - UPLOAD_DIR=/app/data/binaries
    volumes:
      - /Dokploy/data/tez-portal:/app/data
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s

      
      retries: 3
      start_period: 10s

  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - dokploy-network
      - default
    depends_on:
      backend:
        condition: service_healthy

networks:
  dokploy-network:
    external: true
